services:
  - type: web
    name: staffexcelmanager
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn StaffExcelManager.wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: StaffExcelManager.settings
      - key: PYTHON_VERSION
        value: 3.11