{% extends 'base.html' %}
{% block content %}

<style>
    body {
        background: #f5f7fb;
    }

    .sheet-card {
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0px 10px 25px rgba(0,0,0,0.10);
        border: none;
    }

    .sheet-header {
        background: linear-gradient(90deg, #198754, #0f5132);
        color: white;
        padding: 22px;
        text-align: center;
    }

    .sheet-header h4 {
        margin: 0;
        font-weight: bold;
        font-size: 22px;
    }

    .sheet-header p {
        margin: 0;
        font-size: 14px;
        opacity: 0.9;
    }

    .btn-custom {
        border-radius: 14px;
        padding: 10px 18px;
        font-weight: bold;
        font-size: 15px;
    }

    input {
        border-radius: 14px !important;
        padding: 12px !important;
        font-size: 15px;
    }

    input:focus {
        border: 2px solid #198754;
        box-shadow: 0px 0px 8px rgba(25, 135, 84, 0.3);
    }

    .form-label {
        font-size: 15px;
    }
</style>

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card sheet-card">

                <!-- HEADER -->
                <div class="sheet-header">
                    <h4>📑 Create New Sheet</h4>
                    <p>Enter a sheet name and create your Excel sheet</p>
                </div>

                <!-- BODY -->
                <div class="card-body p-4 bg-white">

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-bold text-dark">Sheet Name</label>
                            <input type="text" name="sheet_name" class="form-control"
                                   placeholder="Eg: April Batch Students"
                                   required>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <a href="{% url 'consultant_dashboard' %}" class="btn btn-dark w-50 btn-custom">
                                ⬅ Back
                            </a>

                            <button type="submit" class="btn btn-success w-50 btn-custom">
                                ✅ Create
                            </button>
                        </div>

                    </form>

                </div>

                <!-- FOOTER -->
                <div class="text-center p-3 bg-light" style="font-size: 13px;">
                    <span class="text-muted">Staff Excel Manager | Sheet Creation Panel</span>
                </div>

            </div>

        </div>
    </div>

</div>

{% endblock %}
