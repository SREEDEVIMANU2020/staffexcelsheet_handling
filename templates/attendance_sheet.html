{% extends "base.html" %}
{% block content %}

<style>
    body {
        background: #f5f7fb;
    }

    .sheet-card {
        border-radius: 18px;
        overflow: hidden;
    }

    table th, table td {
        text-align: center;
        vertical-align: middle;
        font-size: 13px;
        padding: 5px;
        white-space: nowrap;
    }

    input {
        border: none;
        outline: none;
        width: 100%;
        text-align: center;
        background: transparent;
        font-size: 13px;
    }

    input:focus {
        background: #fff3cd;
        border-radius: 6px;
    }

    .btn-custom {
        border-radius: 12px;
        padding: 8px 18px;
        font-weight: bold;
    }

    .table-responsive {
        overflow-x: auto;
    }
</style>

<div class="container-fluid mt-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h3 class="fw-bold text-primary mb-0">Sheet : Attendance</h3>
            <p class="text-muted mb-0">Attendance Sheet (31 Days)</p>
        </div>

        <div class="d-flex gap-2">
            <a href="{% url 'consultant_dashboard' %}" class="btn btn-dark btn-custom">
                ⬅ Back
            </a>

            <button type="button" onclick="addRow()" class="btn btn-success btn-custom">
                ➕ Add Row
            </button>

            <button type="button" onclick="saveAttendance()" class="btn btn-primary btn-custom">
                💾 Save Sheet
            </button>
        </div>
    </div>

    <!-- TABLE -->
    <div class="card shadow-lg border-0 sheet-card">
        <div class="card-body p-3">

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle" id="attendanceTable">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Student Name</th>
                            <th>Batch Time</th>
                            <th>Month</th>
                            <th>Year</th>

                            {% for i in days %}
                                <th>{{ i }}</th>
                            {% endfor %}
                        </tr>
                    </thead>

                    <tbody id="tableBody">
                        {% for row in rows %}
                        <tr>
                            <td>{{ forloop.counter }}</td>
                            <td><input type="text" value="{{ row.col1|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col2|default:'' }}"></td>

                            <td><input type="text" value="{{ row.col3|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col4|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col5|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col6|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col7|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col8|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col9|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col10|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col11|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col12|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col13|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col14|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col15|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col16|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col17|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col18|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col19|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col20|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col21|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col22|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col23|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col24|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col25|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col26|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col27|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col28|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col29|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col30|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col31|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col32|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col33|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col3|default:'' }}"></td>
                            <td><input type="text" value="{{ row.col4|default:'' }}"></td>
                        </tr>

                        {% empty %}
                        <tr>
                            <td>1</td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>

                            {% for i in days %}
                                <td><input type="text"></td>
                            {% endfor %}
                        </tr>
                        {% endfor %}
                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

<script>
    function addRow() {
        let tableBody = document.getElementById("tableBody");
        let rowCount = tableBody.rows.length + 1;

        let newRow = document.createElement("tr");

        let dayCols = "";
        for (let i = 1; i <= 31; i++) {
            dayCols += `<td><input type="text"></td>`;
        }

        newRow.innerHTML = `
            <td>${rowCount}</td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            ${dayCols}
        `;

        tableBody.appendChild(newRow);
    }

    function saveAttendance() {
        let table = document.getElementById("attendanceTable");
        let rows = table.querySelectorAll("tbody tr");
        let data = [];

        rows.forEach(row => {
            let inputs = row.querySelectorAll("input");
            let rowData = [];

            inputs.forEach(input => {
                rowData.push(input.value);
            });

            data.push(rowData);
        });

        fetch("{% url 'save_attendance_data' sheet.id %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify({data: data})
        })
        .then(response => response.json())
        .then(result => {
            alert(result.message);
            location.reload();
        })
        .catch(error => {
            alert("Error saving attendance sheet!");
            console.error(error);
        });
    }
</script>

{% endblock %}
