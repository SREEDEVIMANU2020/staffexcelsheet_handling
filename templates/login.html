{% extends 'base.html' %}
{% block content %}

<style>
    body{
        background: linear-gradient(135deg, #0d6efd, #6610f2);
        min-height: 100vh;
    }

    .login-card{
        border-radius: 20px;
        overflow: hidden;
    }

    .login-header{
        background: linear-gradient(135deg, #198754, #0d6efd);
        color: white;
        padding: 25px;
        text-align: center;
    }

    .login-body{
        padding: 35px;
        background: white;
    }

    .form-control{
        border-radius: 12px;
        padding: 12px;
    }

    .btn-login{
        border-radius: 12px;
        padding: 12px;
        font-size: 16px;
    }
</style>

<div class="container mt-5">

    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-md-6 col-lg-5">

            <div class="card shadow-lg border-0 login-card">

                <!-- HEADER -->
                <div class="login-header">
                    <h3 class="fw-bold mb-1">Welcome Back</h3>
                    <p class="mb-0">Login to continue</p>
                </div>

                <!-- BODY -->
                <div class="login-body">

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-bold text-dark">Employee ID</label>
                            <input type="text" name="emp_id" class="form-control"
                                   placeholder="Enter your Employee ID" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold text-dark">Password</label>
                            <input type="password" name="password" class="form-control"
                                   placeholder="Enter your Password" required>
                        </div>

                        <button class="btn btn-success w-100 fw-bold btn-login shadow-sm">
                            Login
                        </button>

                        <div class="text-center mt-4">
                            <p class="text-muted mb-0">
                                Don't have an account?
                                <a href="{% url 'register' %}" class="fw-bold text-primary text-decoration-none">
                                    Register
                                </a>
                            </p>
                        </div>

                    </form>

                </div>
            </div>

            <p class="text-center text-white mt-4 small">
                © 2026 Technovalley Software | Staff Excel Management System
            </p>

        </div>
    </div>

</div>

{% endblock %}
